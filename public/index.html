<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Editor Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="editor.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 Markdown Editor Pro</h1>
            <div class="status">
                <span id="saveStatus">✅ Saved</span>
                <span id="wordCount">0 words</span>
            </div>
        </header>

        <div class="file-toolbar">
            <button id="newFileBtn" class="tool-btn" title="New File (Ctrl+N)">
                📄 New
            </button>
            <button id="openFileBtn" class="tool-btn" title="Open File (Ctrl+O)">
                📂 Open
            </button>
            <button id="saveFileBtn" class="tool-btn" title="Save File (Ctrl+S)">
                💾 Save
            </button>
            <span id="fileName" class="filename">Untitled.md</span>
        </div>

        <div class="toolbar">
            <button class="tool-btn" data-action="bold" title="Bold (Ctrl+B)">
                <strong>B</strong>
            </button>
            <button class="tool-btn" data-action="italic" title="Italic (Ctrl+I)">
                <em>I</em>
            </button>
            <button class="tool-btn" data-action="strike" title="Strike (Ctrl+Shift+X)">
                <s>S</s>
            </button>
            <button class="tool-btn" data-action="code" title="Code (Ctrl+E)">
                &lt;/&gt;
            </button>
            <div class="toolbar-divider"></div>
            <button class="tool-btn" data-action="heading" title="Heading">
                H
            </button>
            <button class="tool-btn" data-action="bullet-list" title="Bullet List">
                •
            </button>
            <button class="tool-btn" data-action="code-block" title="Code Block">
                &lt;&gt;
            </button>
            <div class="toolbar-divider"></div>
            <button class="tool-btn" id="syncPreview" title="Sync Preview">
                ↻
            </button>
        </div>

        <main class="editor-container">
            <div class="editor-pane">
                <div id="editor"></div>
            </div>

            <div class="preview-pane">
                <div id="preview"></div>
            </div>
        </main>

        <footer>
            <button id="saveBtn">💾 Save</button>
            <button id="clearBtn">🗑️ Clear</button>
            <button id="downloadBtn">⬇️ Download MD</button>
            <button id="downloadHtmlBtn">⬇️ Download HTML</button>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module" src="file-manager.js"></script>
    <script type="module" src="editor.js"></script>
</body>
</html>
